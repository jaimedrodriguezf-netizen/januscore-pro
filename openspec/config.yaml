# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Astro v6, React v19, Tailwind CSS v4, TypeScript v6, Drizzle ORM (MySQL)
  Architecture: Component-driven frontend (Astro with React islands) and Drizzle ORM database layer (MySQL)
  Testing: Vitest for unit and integration testing; Playwright for End-to-End testing
  Style: Prettier formatter and ESLint (flat config) linter

testing:
  strict_tdd: true
  detected: 2026-06-10
  runner:
    command: "npm run test"
    framework: Vitest
  layers:
    unit:
      available: true
      tool: Vitest
    integration:
      available: true
      tool: Vitest + @testing-library/react
    e2e:
      available: true
      tool: Playwright
  coverage:
    available: true
    command: "npx vitest run --coverage"
  quality:
    linter:
      available: true
      command: "npm run lint"
    type_checker:
      available: true
      command: "npm run typecheck"
    formatter:
      available: true
      command: "npm run format"

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "npm run test"
  verify:
    test_command: "npm run test && npm run test:e2e"
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
